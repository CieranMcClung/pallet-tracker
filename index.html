<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Container Tracker</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <header class="app-header">
        <div class="logo">📦 Container Tracker</div>
        <button class="btn btn-primary" onclick="showNewContainerModal()">+ New Container</button>
    </header>

    <div class="layout">
        <!-- Sidebar: List of Containers -->
        <aside class="sidebar">
            <h3>Active Containers</h3>
            <ul id="containerList" class="container-list">
                <!-- Populated by JS -->
            </ul>
        </aside>

        <!-- Main Content: Packing & Tracking UI -->
        <main class="main-content">
            <div id="emptyState" class="empty-state">
                <h2>No Container Selected</h2>
                <p>Select a container from the sidebar or create a new one to start tracking progress.</p>
            </div>

            <div id="activeContainerView" class="hidden">
                <div class="container-header">
                    <div>
                        <h2 id="displayContainerName">Container Name</h2>
                        <p id="displayContainerNotes" class="text-secondary">Container ID / Notes</p>
                    </div>
                    <div class="header-actions">
                        <button class="btn btn-danger-outline" onclick="deleteCurrentContainer()">Delete</button>
                    </div>
                </div>

                <!-- Performance Metrics -->
                <div class="metrics-grid">
                    <div class="metric-card">
                        <span class="label">Progress</span>
                        <strong class="value" id="metricProgress">0%</strong>
                        <div class="progress-bar"><div id="progressBarFill" class="progress-fill"></div></div>
                    </div>
                    <div class="metric-card">
                        <span class="label">Total Packed</span>
                        <strong class="value" id="metricPacked">0 / 0</strong>
                    </div>
                    <div class="metric-card">
                        <span class="label">Pallets / Hour (PPH)</span>
                        <strong class="value" id="metricPPH">0.0</strong>
                    </div>
                    <div class="metric-card">
                        <span class="label">Est. Finish Time</span>
                        <strong class="value" id="metricETA">--:--</strong>
                    </div>
                </div>

                <!-- SKUs Section -->
                <div class="skus-section">
                    <div class="section-header">
                        <h3>SKU Manifest</h3>
                        <button class="btn btn-secondary btn-small" onclick="showNewSkuModal()">+ Add SKU</button>
                    </div>
                    <div id="skuList" class="sku-list">
                        <!-- Populated by JS -->
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Universal Modal Overlay -->
    <div id="modalOverlay" class="modal-overlay hidden">
        <div class="modal-dialog">
            <div class="modal-header">
                <h3 id="modalTitle">Modal Title</h3>
            </div>
            <div class="modal-content" id="modalContent">
                <!-- Dynamic Content -->
            </div>
            <div class="modal-actions">
                <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
                <button class="btn btn-primary" id="modalConfirmBtn">Confirm</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
